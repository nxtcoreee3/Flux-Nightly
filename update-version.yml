name: Update Version

on:
  push:
    branches: [ main ]

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update version.json
        run: |
          BUILD=$(echo "${{ github.sha }}" | cut -c1-7)
          DEPLOYED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          # Read current version or default to 1.0.0
          if [ -f version.json ]; then
            VERSION=$(cat version.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('version','1.0.0'))")
          else
            VERSION="1.0.0"
          fi
          echo "{\"build\":\"$BUILD\",\"version\":\"$VERSION\",\"deployedAt\":\"$DEPLOYED_AT\",\"commit\":\"${{ github.sha }}\"}" > version.json
          echo "Updated version.json: build=$BUILD version=$VERSION"

      - name: Commit version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --staged --quiet || git commit -m "chore: update build number [$(echo "${{ github.sha }}" | cut -c1-7)]"
          git push
